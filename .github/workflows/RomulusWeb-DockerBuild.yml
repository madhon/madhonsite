name: RomulusWeb-DockerBuild

on:
  push:
    branches:
      - master
    paths:
      - Romulus.Web/**
  workflow_dispatch:
    
env:
  IMAGE_REPOSITORY: madhon/madhonsite
  DOCKERFILE_PATH: Romulus.Web/Dockerfile
  MSBUILDTERMINALLOGGER: true

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  security-events: write

jobs:
  build:
    name: Build, Scan and Push Image
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          fetch-tags: false
          clean: true

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Image
        uses: docker/build-push-action@v7
        with:
          context: ./Romulus.Web
          file: ${{ env.DOCKERFILE_PATH }}
          load: true
          push: false
          tags: ${{ env.IMAGE_REPOSITORY }}:${{ github.run_id }}

      - name: Install Trivy
        uses: aquasecurity/setup-trivy@v0.2.6
        with:
          version: v0.70.0

      - name: Trivy Scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ env.IMAGE_REPOSITORY }}:${{ github.run_id }}
          scan-type: image
          scanners: misconfig,secret,vuln
          severity: HIGH,CRITICAL
          format: sarif
          output: trivy-results.sarif

      - name: Upload Trivy SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: trivy-results.sarif

      - name: Push Image
        run: |
          docker push ${{ env.IMAGE_REPOSITORY }}:${{ github.run_id }}
          docker push ${{ env.IMAGE_REPOSITORY }}:latest