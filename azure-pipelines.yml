trigger:
- master

pool:
  vmImage: 'ubuntu-latest'

variables:
  buildConfiguration: 'Release'
  rid: 'linux-x64'

steps:
- task: UseDotNet@2
  inputs:
    packageType: 'sdk'
    version: '3.1.x'
    performMultiLevelLookup: true
- task: DotNetCoreCLI@2
  displayName: 'dotnet build $(buildConfiguration)'
  inputs:
    command: 'build'
    projects: '**/*.csproj'
    arguments: '-r $(rid) --configuration $(buildConfiguration)'
- task: DotNetCoreCLI@2
  displayName: 'Publish'
  inputs:
    command: 'publish'
    publishWebProjects: true
    arguments: '-r $(rid) --no-build --configuration $(buildConfiguration) --output $(Build.ArtifactStagingDirectory)'
    zipAfterPublish: True
- task: PublishBuildArtifacts@1
  displayName: 'Publish Artifacts'
  inputs:
    PathtoPublish: '$(Build.ArtifactStagingDirectory)'
    ArtifactName: 'drop'
    publishLocation: 'Container'
- task: CopyFilesOverSSH@0
  displayName: 'Copy Files via SSH'
  inputs:
    sshEndpoint: 'DigialOcean'
    sourceFolder: '$(Build.ArtifactStagingDirectory)'
    contents: '**'
    targetFolder: '/home/madhon_webdeploy/files'
    readyTimeout: '20000'
- task: SSH@0
  displayName: "Update site files via SSH"
  inputs:
    sshEndpoint: 'DigialOcean'
    runOptions: 'inline'
    inline: |
      #!/bin/sh
      
      WEBROOT=/var/www/madhon.co.uk
      
      SOURCE=/home/madhon_webdeploy/files
      
      sudo systemctl stop madhonsite-kestrel.service
      
      cd $SOURCE/output
      
      unzip -o $SOURCE/Romulus.Web.zip
      
      sudo cp -r $SOURCE/output/* $WEBROOT
      
      sudo chown -R www-data:www-data $WEBROOT
      
      sudo systemctl start madhonsite-kestrel.service
    readyTimeout: '20000'