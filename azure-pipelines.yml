trigger:
 batch: true
 branches:
  include:
    - master
   
pool:
  vmImage: 'ubuntu-20.04'

variables:
  buildConfiguration: 'Release'
  rid: 'linux-x64'

steps:
- task: UseDotNet@2
  displayName: 'Install SDK'
  inputs:
    packageType: 'sdk'
    version: '5.x'
    performMultiLevelLookup: true
- task: DotNetCoreCLI@2
  displayName: 'Restore Packages'
  inputs:
    command: 'restore'
    projects: '**/*.csproj'
    feedsToUse: 'select'
    verbosityRestore: 'Quiet'
- task: DotNetCoreCLI@2
  displayName: 'Build Project'
  inputs:
    command: 'build'
    projects: '**/*.csproj'
    arguments: '-r $(rid) --configuration $(buildConfiguration)'
- task: DotNetCoreCLI@2
  displayName: 'Publish Build'
  inputs:
    command: 'publish'
    publishWebProjects: true
    arguments: '-r $(rid) --no-build --configuration $(buildConfiguration) --output $(Build.ArtifactStagingDirectory)'
    zipAfterPublish: True
- task: PublishBuildArtifacts@1
  displayName: 'Publish Artifacts'
  inputs:
    PathtoPublish: '$(Build.ArtifactStagingDirectory)'
    ArtifactName: 'drop'
    publishLocation: 'Container'
- task: CopyFilesOverSSH@0
  displayName: 'Copy files to digialocean'
  inputs:
    sshEndpoint: 'DigialOcean'
    sourceFolder: '$(System.DefaultWorkingDirectory)/_MadhonCOMWebsite'
    contents: '**'
    targetFolder: '/home/madhon_webdeploy/files'
    cleanTargetFolder: true
    readyTimeout: '20000'
- task: SSH@0
  displayName: 'Update Site Files'
  inputs:
    sshEndpoint: 'DigialOcean'
    runOptions: 'inline'
    inline: |
      #!/bin/sh
      WEBROOT=/var/www/madhon.co.uk
      SOURCE=/home/madhon_webdeploy/files
      echo "Stopping site"
      sudo systemctl stop madhonsite-kestrel.service
      cd $SOURCE/output
      echo "Unziping files"
      unzip -oq $SOURCE/drop/Romulus.Web.zip
      echo "Copying files and resetting permissions"
      sudo cp -r $SOURCE/output/* $WEBROOT
      sudo chown -R www-data:www-data $WEBROOT
      echo "Starting Site"
      sudo systemctl start madhonsite-kestrel.service
    readyTimeout: '20000'