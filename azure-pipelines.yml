trigger:
 batch: true
 branches:
  include:
    - master
   
pool:
  vmImage: 'ubuntu-20.04'

variables:
  buildConfiguration: 'Release'
  rid: 'linux-x64'
  NUGET_PACKAGES: $(Pipeline.Workspace)/.nuget/packages

steps:
- checkout: self
  fetchDepth: 2
- task: UseDotNet@2
  displayName: 'Install SDK'
  inputs:
    packageType: 'sdk'
    version: '5.x'
    performMultiLevelLookup: true
- task: Cache@2
  inputs:
    key: '$(Agent.OS)" | $(Build.SourcesDirectory)/packages.lock.json'
    path: '$(NUGET_PACKAGES)'
    restoreKeys: |
      nuget | "$(Agent.OS)"
      nuget
- task: DotNetCoreCLI@2
  displayName: 'Restore Packages'
  inputs:
    command: 'restore'
    projects: '**/*.csproj'
    feedsToUse: 'select'
    verbosityRestore: 'Quiet'
- task: DotNetCoreCLI@2
  displayName: 'Build Project'
  inputs:
    command: 'build'
    projects: '**/*.csproj'
    arguments: '-r $(rid) --configuration $(buildConfiguration)'
- task: SnykSecurityScan@0
  inputs:
    serviceConnectionEndpoint: 'Madhon Snyk'
    testType: 'app'
    monitorOnBuild: true
    failOnIssues: true
    testDirectory: '$(Build.SourcesDirectory)/Romulus.Web'    
- task: DotNetCoreCLI@2
  displayName: 'Publish Build'
  inputs:
    command: 'publish'
    publishWebProjects: true
    arguments: '-r $(rid) --no-build --configuration $(buildConfiguration) --output $(Build.ArtifactStagingDirectory)'
    zipAfterPublish: True
- task: PublishBuildArtifacts@1
  displayName: 'Publish Artifacts'
  inputs:
    PathtoPublish: '$(Build.ArtifactStagingDirectory)'
    ArtifactName: 'drop'
    publishLocation: 'Container'
