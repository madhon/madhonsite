trigger:
 batch: true
 branches:
  include:
    - master

pool:
  vmImage: 'ubuntu-20.04'

variables:
  buildConfiguration: 'Release'
  rid: 'linux-x64'
  agentImage: "ubuntu-20.04"
  DOTNET_NOLOGO: true
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  DOTNET_GENERATE_ASPNET_CERTIFICATE: false
  NUGET_XMLDOC_MODE: skip
  NUGET_PACKAGES: $(Pipeline.Workspace)/.nuget/packages

stages:
- stage: Build
  displayName: "Build Site"
  pool:
    vmImage: $(agentImage)
  jobs:
  - job: Build
    displayName: 'Build App'
    steps:
    - checkout: self
      fetchDepth: 2
    - script: |
        echo -e -n "{\"buildNumber\":\"$(Build.BuildNumber)\",\"buildId\":\"$(Build.BuildId)\",\"branchName\":\"$(Build.SourceBranchName)\",\"commitHash\":\"$(Build.SourceVersion)\"}" > "$(Build.SourcesDirectory)/Romulus.Web/buildinfo.json"
      displayName: "emit build details as JSON"
      failOnStderr: true
    - task: UseDotNet@2
      displayName: 'Install SDK'
      inputs:
        packageType: 'sdk'
        version: '7.x'
        performMultiLevelLookup: true
    - task: Cache@2
      displayName: 'Cache Packages'
      inputs:
        key: 'nuget | "$(Agent.OS)" | **/packages.lock.json,!**/bin/**,!**/obj/**'
        restoreKeys: |
          nuget | "$(Agent.OS)"
          nuget
        path: '$(NUGET_PACKAGES)'
        cacheHitVar: 'CACHE_RESTORED'
    - task: DotNetCoreCLI@2
      displayName: 'Restore Packages'
      condition: ne(variables.CACHE_RESTORED, true)
      inputs:
        command: 'restore'
        projects: '**/*.csproj'
        feedsToUse: 'select'
        verbosityRestore: 'Quiet'
    - task: DotNetCoreCLI@2
      displayName: 'Build Project'
      inputs:
        command: 'build'
        projects: '**/*.csproj'
        arguments: '-r $(rid) --configuration $(buildConfiguration) --self-contained true --no-restore -p:PublishSingleFile=true'

    - task: SnykSecurityScan@1
      displayName: 'Snyk Security Scan'
      inputs:
        serviceConnectionEndpoint: 'Madhon Snyk'
        testType: 'app'
        targetFile: 'Romulus.Web/obj/project.assets.json'
        monitorWhen: 'always'
        failOnIssues: true
        projectName: 'MadhonCOMWebsite'
        organization: 'd2752ef3-cc32-4f0b-8239-4d7235bdf118'

    - task: DotNetCoreCLI@2
      displayName: 'Publish Build'
      inputs:
        command: 'publish'
        publishWebProjects: true
        arguments: '-r $(rid) --no-restore --no-build --configuration $(buildConfiguration) --output $(Build.ArtifactStagingDirectory) --self-contained true /p:PublishSingleFile=true -p:TrimMode=CopyUsed -p:_TrimmerDefaultAction=copy'
        zipAfterPublish: True
    - task: PublishPipelineArtifact@1
      displayName: 'Upload Build Artifact'
      inputs:
        targetPath: $(Build.ArtifactStagingDirectory)
        ArtifactName: 'drop'


- stage: Deploy
  displayName: "Deploy To DigitalOcean"
  dependsOn: ['Build']
  pool:
    vmImage: $(agentImage)
  jobs:
  - job: DODepoly
    displayName: 'Deploy to Digital Ocean'
    steps:
    - task: DownloadPipelineArtifact@2
      displayName: 'Download Build Artifact'
      inputs:
        source: 'current'
        artifact: 'drop'
        path: '$(System.DefaultWorkingDirectory)/_MadhonCOMWebsite'
    - task: CopyFilesOverSSH@0
      displayName: 'Copy files to DigitalOcean'
      inputs:
        sshEndpoint: DigialOcean
        sourceFolder: '$(System.DefaultWorkingDirectory)/_MadhonCOMWebsite'
        targetFolder: '/home/madhon_webdeploy/files'
    - task: SSH@0
      displayName: 'Update Site Files'
      inputs:
        sshEndpoint: DigialOcean
        runOptions: inline
        inline: |
         #!/bin/sh
         WEBROOT=/var/www/madhon.co.uk
         SOURCE=/home/madhon_webdeploy/files
         echo "Stopping site"
         sudo systemctl stop madhonsite-kestrel.service
         cd $SOURCE/output
         echo "Unziping files"
         unzip -oq $SOURCE/Romulus.Web.zip
         echo "Copying files and resetting permissions"
         sudo cp -r $SOURCE/output/* $WEBROOT
         sudo chown -R www-data:www-data $WEBROOT
         sudo /usr/bin/rm $WEBROOT/appsettings.Development.json
         echo "Starting Site"
         sudo systemctl start madhonsite-kestrel.service
