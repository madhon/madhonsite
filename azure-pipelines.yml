trigger:
 batch: true
 branches:
  include:
    - master
   
pool:
  vmImage: 'ubuntu-20.04'

variables:
  buildConfiguration: 'Release'
  rid: 'linux-x64'
  DOTNET_NOLOGO: true
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  
steps:
- checkout: self
  fetchDepth: 2
- script: |
      echo -e -n "{\"buildNumber\":\"$(Build.BuildNumber)\",\"buildId\":\"$(Build.BuildId)\",\"branchName\":\"$(Build.SourceBranchName)\",\"commitHash\":\"$(Build.SourceVersion)\"}" > "$(Build.SourcesDirectory)/Romulus.Web/buildinfo.json"
      echo -e -n "{\"buildNumber\":\"$(Build.BuildNumber)\",\"buildId\":\"$(Build.BuildId)\",\"branchName\":\"$(Build.SourceBranchName)\",\"commitHash\":\"$(Build.SourceVersion)\"}" > "$(Build.SourcesDirectory)/Romulus.Web/buildinfo.json"
  displayName: "emit build details as JSON"
  failOnStderr: true
- task: UseDotNet@2
  displayName: 'Install SDK'
  inputs:
    packageType: 'sdk'
    version: '6.x'
    performMultiLevelLookup: true
- task: DotNetCoreCLI@2
  displayName: 'Restore Packages'
  inputs:
    command: 'restore'
    projects: '**/*.csproj'
    feedsToUse: 'select'
    verbosityRestore: 'Quiet'
- task: DotNetCoreCLI@2
  displayName: 'Build Project'
  inputs:
    command: 'build'
    projects: '**/*.csproj'
    arguments: '-r $(rid) --configuration $(buildConfiguration) --no-self-contained'
- task: DotNetCoreCLI@2
  displayName: 'Publish Build'
  inputs:
    command: 'publish'
    publishWebProjects: true
    arguments: '-r $(rid) --no-restore --no-build --configuration $(buildConfiguration) --output $(Build.ArtifactStagingDirectory) --no-self-contained'
    zipAfterPublish: True
- task: PublishBuildArtifacts@1
  displayName: 'Publish Artifacts'
  inputs:
    PathtoPublish: '$(Build.ArtifactStagingDirectory)'
    ArtifactName: 'drop'
    publishLocation: 'Container'
