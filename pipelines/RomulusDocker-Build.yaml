trigger:
 batch: true
 branches:
   include:
    - master
 paths:
  include:
  - Romulus.Web/*

variables:
  dockerRegistryServiceConnection: 'DockerHubMadhon'
  imageRepository: 'madhon/madhonsite'
  dockerfilePath: '$(Build.SourcesDirectory)/Romulus.Web/Dockerfile'
  tag: '$(Build.BuildId)'
  vmImageName: 'ubuntu-22.04'
  MSBUILDTERMINALLOGGER: true
  
stages:
  - stage: Build
    displayName: Build and Push Image
    jobs:
    - job: Build
      displayName: Build
      pool:
        vmImage: $(vmImageName)
      steps:
      - checkout: self
        fetchDepth: 1
        fetchTags: false
        clean: true

      - task: Docker@2
        displayName: Build $(imageRepository):$(tag)
        inputs:
          command: build
          containerRegistry: $(dockerRegistryServiceConnection)
          repository: $(imageRepository)
          Dockerfile: $(dockerfilePath)
          tags: $(tag)
          
      - task: Trivy@2
        displayName: Trivy Scan
        inputs:
          version: latest
          docker: false
          type: 'image'
          target: '$(imageRepository):$(tag)'
          scanners: 'misconfig, secret, vuln'
          severities: 'HIGH, CRITICAL'
          reports: 'sarif'

      - task: Docker@2
        displayName: Build and Push to $(imageRepository):$(tag)
        inputs:
          command: Push
          containerRegistry: $(dockerRegistryServiceConnection)
          repository: $(imageRepository)
          Dockerfile: $(dockerfilePath)
          tags: $(tag)
